version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "" ]; then IMAGE_TAG=latest; fi
      - echo "Image tag will be $IMAGE_TAG"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $ECR_REPO_URI:$IMAGE_TAG .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest

      # ── For Deploy-Dev / Deploy-UAT (simple "ECS" deploy action) ──────
      # CodePipeline's ECS deploy action reads this to swap the image on
      # whatever task definition is currently active for that service.
      - echo "Writing imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$ECR_REPO_URI:$IMAGE_TAG" > imagedefinitions.json
      - cat imagedefinitions.json

      # ── For Deploy-Prod (CodeDeployToECS blue/green action) ───────────
      # taskdef.json is generated here (not committed statically) so it always
      # reflects the current ECR image URI, roles, cluster, region, and logs.
      - echo "Writing taskdef.json..."
      - |
        cat > taskdef.json << EOF
        {
          "family": "${ECS_CLUSTER_NAME}-prod",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "256",
          "memory": "512",
          "executionRoleArn": "${EXECUTION_ROLE_ARN}",
          "taskRoleArn": "${TASK_ROLE_ARN}",
          "containerDefinitions": [
            {
              "name": "${CONTAINER_NAME}",
              "image": "${ECR_REPO_URI}:${IMAGE_TAG}",
              "essential": true,
              "portMappings": [
                { "containerPort": ${CONTAINER_PORT}, "protocol": "tcp" }
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "${LOG_GROUP_NAME}",
                  "awslogs-region": "${AWS_REGION}",
                  "awslogs-stream-prefix": "prod"
                }
              }
            }
          ]
        }
        EOF
      - cat taskdef.json
 
      # appspec.yaml tells CodeDeploy which container/port to route traffic to
      # on the new task set. <TASK_DEFINITION> is CodeDeploy's own placeholder
      # (not CodePipeline's) — CodeDeploy fills it in automatically once it
      # registers the task definition rendered from taskdef.json above.
      - echo "Writing appspec.yaml..."
      - |
        cat > appspec.yaml << EOF
        version: 0.0
        Resources:
          - TargetService:
              Type: AWS::ECS::Service
              Properties:
                TaskDefinition: <TASK_DEFINITION>
                LoadBalancerInfo:
                  ContainerName: "${CONTAINER_NAME}"
                  ContainerPort: ${CONTAINER_PORT}
        EOF
      - cat appspec.yaml

artifacts:
  files:
    - imagedefinitions.json
    - taskdef.json
    - appspec.yaml
